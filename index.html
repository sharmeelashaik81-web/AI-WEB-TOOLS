<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>AI Tools Hub</title>
   <style>
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
       }

       :root {
           --primary: #00d4ff;
           --secondary: #7b2cbf;
           --accent: #ff006e;
           --bg: #0a0a0f;
           --card-bg: rgba(20, 20, 30, 0.6);
       }

       body {
           font-family: 'Segoe UI', system-ui, sans-serif;
           background: var(--bg);
           color: #fff;
           min-height: 100vh;
           overflow-x: hidden;
       }

       /* Animated Background */
       .bg-mesh {
           position: fixed;
           inset: 0;
           z-index: -2;
           background: 
               radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
               radial-gradient(ellipse at 80% 80%, rgba(123, 44, 191, 0.15) 0%, transparent 50%),
               radial-gradient(ellipse at 50% 50%, rgba(255, 0, 110, 0.08) 0%, transparent 60%);
           animation: meshPulse 8s ease-in-out infinite;
       }

       @keyframes meshPulse {
           0%, 100% { filter: hue-rotate(0deg) blur(0px); }
           50% { filter: hue-rotate(30deg) blur(2px); }
       }

       .noise-overlay {
           position: fixed;
           inset: 0;
           z-index: -1;
           opacity: 0.03;
           background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
       }

       /* Floating Orbs */
       .orbs {
           position: fixed;
           inset: 0;
           z-index: -1;
           overflow: hidden;
           pointer-events: none;
       }

       .orb {
           position: absolute;
           border-radius: 50%;
           filter: blur(60px);
           animation: orbFloat 20s infinite ease-in-out;
       }

       .orb-1 {
           width: 400px;
           height: 400px;
           background: var(--primary);
           top: -10%;
           left: -10%;
           opacity: 0.2;
           animation-delay: 0s;
       }

       .orb-2 {
           width: 300px;
           height: 300px;
           background: var(--secondary);
           bottom: -5%;
           right: -5%;
           opacity: 0.2;
           animation-delay: -7s;
       }

       .orb-3 {
           width: 200px;
           height: 200px;
           background: var(--accent);
           top: 50%;
           left: 50%;
           opacity: 0.15;
           animation-delay: -14s;
       }

       @keyframes orbFloat {
           0%, 100% { transform: translate(0, 0) scale(1); }
           25% { transform: translate(50px, -50px) scale(1.1); }
           50% { transform: translate(-30px, 30px) scale(0.9); }
           75% { transform: translate(20px, 40px) scale(1.05); }
       }

       /* Header */
       header {
           padding: 40px 5% 20px;
           text-align: center;
           position: relative;
       }

       .logo-glow {
           width: 120px;
           height: 120px;
           margin: 0 auto 30px;
           position: relative;
           display: grid;
           place-items: center;
       }

       .logo-ring {
           position: absolute;
           inset: 0;
           border: 2px solid transparent;
           border-radius: 50%;
           background: linear-gradient(var(--bg), var(--bg)) padding-box,
                       linear-gradient(135deg, var(--primary), var(--secondary), var(--accent)) border-box;
           animation: ringSpin 10s linear infinite;
       }

       .logo-ring::before {
           content: '';
           position: absolute;
           inset: -4px;
           border-radius: 50%;
           background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
           opacity: 0.3;
           filter: blur(20px);
           animation: ringPulse 2s ease-in-out infinite;
       }

       @keyframes ringSpin {
           to { transform: rotate(360deg); }
       }

       @keyframes ringPulse {
           0%, 100% { opacity: 0.3; transform: scale(1); }
           50% { opacity: 0.6; transform: scale(1.05); }
       }

       .logo-inner {
           font-size: 3.5rem;
           z-index: 2;
           animation: logoBounce 2s ease-in-out infinite;
       }

       @keyframes logoBounce {
           0%, 100% { transform: translateY(0); }
           50% { transform: translateY(-10px); }
       }

       h1 {
           font-size: clamp(2rem, 5vw, 3.5rem);
           font-weight: 800;
           background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent), var(--primary));
           background-size: 300% 100%;
           -webkit-background-clip: text;
           -webkit-text-fill-color: transparent;
           animation: gradientMove 5s linear infinite;
           margin-bottom: 15px;
       }

       @keyframes gradientMove {
           0% { background-position: 0% 50%; }
           100% { background-position: 300% 50%; }
       }

       .subtitle {
           color: #888;
           font-size: 1.1rem;
           max-width: 500px;
           margin: 0 auto 30px;
           line-height: 1.6;
       }

       /* Category Filter */
       .filter-tabs {
           display: flex;
           justify-content: center;
           gap: 15px;
           flex-wrap: wrap;
           padding: 0 5%;
           margin-bottom: 40px;
       }

       .tab {
           padding: 12px 28px;
           border-radius: 50px;
           background: var(--card-bg);
           border: 1px solid rgba(255,255,255,0.08);
           color: #aaa;
           font-size: 0.95rem;
           cursor: pointer;
           transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
           position: relative;
           overflow: hidden;
       }

       .tab::before {
           content: '';
           position: absolute;
           inset: 0;
           background: linear-gradient(135deg, var(--primary), var(--secondary));
           opacity: 0;
           transition: opacity 0.3s;
       }

       .tab span {
           position: relative;
           z-index: 1;
       }

       .tab:hover, .tab.active {
           color: #fff;
           transform: translateY(-3px);
           box-shadow: 0 10px 40px rgba(0,212,255,0.2);
       }

       .tab.active::before, .tab:hover::before {
           opacity: 1;
       }

       /* Tools Grid */
       .tools-container {
           padding: 0 5% 80px;
           max-width: 1600px;
           margin: 0 auto;
       }

       .tools-grid {
           display: grid;
           grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
           gap: 25px;
       }

       /* Tool Card */
       .tool-card {
           background: var(--card-bg);
           border-radius: 24px;
           padding: 30px;
           border: 1px solid rgba(255,255,255,0.06);
           position: relative;
           overflow: hidden;
           cursor: pointer;
           transform-style: preserve-3d;
           perspective: 1000px;
           transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
       }

       .tool-card::before {
           content: '';
           position: absolute;
           inset: 0;
           background: linear-gradient(135deg, 
               rgba(0,212,255,0.1) 0%, 
               rgba(123,44,191,0.1) 50%, 
               rgba(255,0,110,0.1) 100%);
           opacity: 0;
           transition: opacity 0.4s;
       }

       .tool-card:hover::before {
           opacity: 1;
       }

       .card-glow {
           position: absolute;
           width: 200px;
           height: 200px;
           background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
           opacity: 0;
           transition: opacity 0.4s;
           pointer-events: none;
       }

       .tool-card:hover {
           transform: translateY(-10px) scale(1.02);
           border-color: rgba(0,212,255,0.3);
           box-shadow: 
               0 25px 50px rgba(0,0,0,0.4),
               0 0 30px rgba(0,212,255,0.1);
       }

       .tool-card:hover .card-glow {
           opacity: 0.15;
       }

       /* Card Content */
       .card-header {
           display: flex;
           align-items: center;
           gap: 20px;
           margin-bottom: 20px;
           position: relative;
           z-index: 1;
       }

       .tool-icon {
           width: 70px;
           height: 70px;
           border-radius: 20px;
           display: flex;
           align-items: center;
           justify-content: center;
           font-size: 2.2rem;
           position: relative;
           transition: all 0.4s;
       }

       .tool-card:hover .tool-icon {
           transform: scale(1.1) rotate(-5deg);
       }

       .icon-bg {
           position: absolute;
           inset: 0;
           border-radius: 20px;
           opacity: 0.2;
           transition: all 0.4s;
       }

       .tool-card:hover .icon-bg {
           opacity: 0.4;
           transform: scale(1.2);
       }

       .tool-info h3 {
           font-size: 1.3rem;
           font-weight: 700;
           margin-bottom: 6px;
           transition: color 0.3s;
       }

       .tool-card:hover .tool-info h3 {
           color: var(--primary);
       }

       .tool-category {
           font-size: 0.8rem;
           color: #888;
           text-transform: uppercase;
           letter-spacing: 1px;
       }

       .tool-desc {
           color: #aaa;
           font-size: 0.95rem;
           line-height: 1.7;
           margin-bottom: 25px;
           position: relative;
           z-index: 1;
       }

       .card-footer {
           display: flex;
           justify-content: space-between;
           align-items: center;
           position: relative;
           z-index: 1;
       }

       .tool-tag {
           padding: 6px 16px;
           border-radius: 50px;
           font-size: 0.75rem;
           font-weight: 600;
           text-transform: uppercase;
           letter-spacing: 0.5px;
       }

       .tag-free { background: rgba(34,197,94,0.15); color: #22c55e; }
       .tag-freemium { background: rgba(234,179,8,0.15); color: #eab308; }
       .tag-paid { background: rgba(239,68,68,0.15); color: #ef4444; }

       .launch-btn {
           width: 45px;
           height: 45px;
           border-radius: 50%;
           background: linear-gradient(135deg, var(--primary), var(--secondary));
           display: flex;
           align-items: center;
           justify-content: center;
           font-size: 1.2rem;
           transform: scale(0.8);
           opacity: 0;
           transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
       }

       .tool-card:hover .launch-btn {
           transform: scale(1);
           opacity: 1;
       }

       .launch-btn::before {
           content: '';
           position: absolute;
           inset: -3px;
           border-radius: 50%;
           background: linear-gradient(135deg, var(--primary), var(--accent));
           opacity: 0;
           z-index: -1;
           animation: btnPulse 2s infinite;
       }

       @keyframes btnPulse {
           0%, 100% { transform: scale(1); opacity: 0.5; }
           50% { transform: scale(1.3); opacity: 0; }
       }

       /* 3D Tilt Effect */
       .tilt-effect {
           transition: transform 0.1s ease-out;
       }

       /* Loading Animation */
       .card-enter {
           animation: cardEnter 0.6s ease-out backwards;
       }

       @keyframes cardEnter {
           0% {
               opacity: 0;
               transform: translateY(40px) scale(0.9);
           }
           100% {
               opacity: 1;
               transform: translateY(0) scale(1);
           }
       }

       /* Particles on Click */
       .click-particle {
           position: absolute;
           width: 8px;
           height: 8px;
           border-radius: 50%;
           pointer-events: none;
           animation: particleBurst 0.8s ease-out forwards;
       }

       @keyframes particleBurst {
           0% {
               transform: translate(var(--tx), var(--ty)) scale(1);
               opacity: 1;
           }
           100% {
               transform: translate(calc(var(--tx) * 3), calc(var(--ty) * 3)) scale(0);
               opacity: 0;
           }
       }

       /* Footer */
       footer {
           text-align: center;
           padding: 40px 5%;
           color: #555;
           font-size: 0.9rem;
       }

       footer a {
           color: var(--primary);
           text-decoration: none;
       }

       /* Scrollbar */
       ::-webkit-scrollbar {
           width: 10px;
       }

       ::-webkit-scrollbar-track {
           background: var(--bg);
       }

       ::-webkit-scrollbar-thumb {
           background: linear-gradient(var(--primary), var(--secondary));
           border-radius: 5px;
       }

       /* Responsive */
       @media (max-width: 768px) {
           .tools-grid {
               grid-template-columns: 1fr;
           }
           
           .filter-tabs {
               gap: 10px;
           }
           
           .tab {
               padding: 10px 20px;
               font-size: 0.85rem;
           }
       }

       /* Spotlight Effect */
       .spotlight {
           position: fixed;
           width: 600px;
           height: 600px;
           background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 60%);
           pointer-events: none;
           opacity: 0;
           transition: opacity 0.3s;
           z-index: 0;
       }
   </style>
</head>
<body>
   <div class="bg-mesh"></div>
   <div class="noise-overlay"></div>
   <div class="orbs">
       <div class="orb orb-1"></div>
       <div class="orb orb-2"></div>
       <div class="orb orb-3"></div>
   </div>
   <div class="spotlight" id="spotlight"></div>

   <header>
       <div class="logo-glow">
           <div class="logo-ring"></div>
           <div class="logo-inner">🤖</div>
       </div>
       <h1>AI Tools Hub</h1>
       <p class="subtitle">Discover and access the world's most powerful artificial intelligence tools in one place</p>
   </header>

   <div class="filter-tabs">
       <button class="tab active" data-category="all"><span>✨ All Tools</span></button>
       <button class="tab" data-category="text"><span>📝 Text</span></button>
       <button class="tab" data-category="image"><span>🎨 Image</span></button>
       <button class="tab" data-category="code"><span>💻 Code</span></button>
       <button class="tab" data-category="audio"><span>🎵 Audio</span></button>
       <button class="tab" data-category="video"><span>🎬 Video</span></button>
   </div>

   <main class="tools-container">
       <div class="tools-grid" id="toolsGrid"></div>
   </main>

   <footer>
       <p>Made with 💜 | Explore the future of AI</p>
   </footer>

   <script>
       // AI Tools Data
       const tools = [
           { name: 'CHATGPT', category: 'text', icon: '💬', desc: 'Advanced conversational AI for natural language understanding and generation.', tag: 'freemium', color: '#10a37f', url: 'https://chat.openai.com' },
           { name: 'CLAUDE', category: 'text', icon: '🧠', desc: 'Anthropic\'s AI assistant with exceptional reasoning and analysis capabilities.', tag: 'freemium', color: '#d97757', url: 'https://claude.ai' },
           { name: 'GEMINI', category: 'text', icon: '♊', desc: 'Google\'s multimodal AI with deep integration across Google services.', tag: 'free', color: '#4285f4', url: 'https://gemini.google.com' },
           { name: 'Yupp', category: 'image', icon: '🎨', desc: 'Create stunning, artistic images from text descriptions.', tag: 'paid', color: '#da5bd6', url: 'https://yupp.ai/' },
           { name: 'DALL·E 3', category: 'image', icon: '🖼️', desc: 'OpenAI\'s image generation with remarkable detail and accuracy.', tag: 'paid', color: '#10a37f', url: 'https://openai.com/dall-e-3' },
           { name: 'ARENA AI', category: 'image', icon: '🌊', desc: 'Open-source image generation with infinite customization options.', tag: 'free', color: '#ff9e00', url: 'https://arena.ai/' },
           { name: 'GITHUB COPILOT', category: 'code', icon: '👨‍💻', desc: 'AI pair programmer that suggests code completions in real-time.', tag: 'paid', color: '#6e40c9', url: 'https://github.com/copilot' },
           { name: 'CONTRA', category: 'code', icon: '⚡', desc: 'AI-first code editor built for productivity and speed.', tag: 'freemium', color: '#00d4aa', url: 'https://contra.com/' },
           { name: 'PINOKIO AI', category: 'code', icon: '🔄', desc: 'Collaborative coding environment with built-in AI assistance.', tag: 'freemium', color: '#f26207', url: 'https://pinokio.co/' },
           { name: 'ELEVENLABS', category: 'audio', icon: '🎙️', desc: 'Most realistic text-to-speech and voice cloning technology.', tag: 'freemium', color: '#6366f1', url: 'https://elevenlabs.io' },
           { name: 'DESIGN ARENA', category: 'audio', icon: '🎵', desc: 'Create original songs and music with simple text prompts.', tag: 'freemium', color: '#ef4444', url: 'https://www.designarena.ai/' },
           { name: 'Runway', category: 'video', icon: '🎬', desc: 'Professional video editing and generation with AI magic tools.', tag: 'paid', color: '#ff00a0', url: 'https://runwayml.com' },
           { name: 'Pika', category: 'video', icon: '🐱', desc: 'Transform ideas into captivating videos with AI.', tag: 'freemium', color: '#ec4899', url: 'https://pika.art' },
           { name: 'HeyGen', category: 'video', icon: '🎭', desc: 'Create AI avatars and talking videos effortlessly.', tag: 'paid', color: '#8b5cf6', url: 'https://www.heygen.com' },
           { name: 'Perplexity', category: 'text', icon: '🔍', desc: 'AI-powered search with cited answers and real-time information.', tag: 'free', color: '#2294ff', url: 'https://www.perplexity.ai' },
           { name: 'Sora', category: 'video', icon: '🌌', desc: 'OpenAI\'s text-to-video model creating realistic scenes.', tag: 'paid', color: '#10a37f', url: 'https://openai.com/sora' },
           { name: 'Leonardo.ai', category: 'image', icon: '🦁', desc: 'Game asset and concept art generation specialized AI.', tag: 'freemium', color: '#f59e0b', url: 'https://leonardo.ai' },
           { name: 'Synthesia', category: 'video', icon: '📺', desc: 'Create professional videos with AI avatars in minutes.', tag: 'paid', color: '#06b5d4', url: 'https://www.synthesia.io' }
       ];

       // Render Tools
       const toolsGrid = document.getElementById('toolsGrid');

       function renderTools(category = 'all') {
           const filtered = category === 'all' ? tools : tools.filter(t => t.category === category);
           
           toolsGrid.innerHTML = '';
           
           filtered.forEach((tool, index) => {
               const card = document.createElement('div');
               card.className = 'tool-card card-enter tilt-effect';
               card.style.animationDelay = `${index * 0.05}s`;
               card.dataset.url = tool.url;
               
               card.innerHTML = `
                   <div class="card-glow"></div>
                   <div class="card-header">
                       <div class="tool-icon">
                           <div class="icon-bg" style="background: ${tool.color}"></div>
                           ${tool.icon}
                       </div>
                       <div class="tool-info">
                           <h3>${tool.name}</h3>
                           <span class="tool-category">${tool.category}</span>
                       </div>
                   </div>
                   <p class="tool-desc">${tool.desc}</p>
                   <div class="card-footer">
                       <span class="tool-tag tag-${tool.tag}">${tool.tag}</span>
                       <div class="launch-btn">🚀</div>
                   </div>
               `;
               
               toolsGrid.appendChild(card);
           });
           
           initCardEffects();
       }

       // Card Effects
       function initCardEffects() {
           const cards = document.querySelectorAll('.tool-card');
           
           cards.forEach(card => {
               // 3D Tilt
               card.addEventListener('mousemove', (e) => {
                   const rect = card.getBoundingClientRect();
                   const x = e.clientX - rect.left;
                   const y = e.clientY - rect.top;
                   const centerX = rect.width / 2;
                   const centerY = rect.height / 2;
                   
                   const rotateX = (y - centerY) / 15;
                   const rotateY = (centerX - x) / 15;
                   
                   card.style.transform = `translateY(-10px) perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
                   
                   // Move glow
                   const glow = card.querySelector('.card-glow');
                   glow.style.left = `${x - 100}px`;
                   glow.style.top = `${y - 100}px`;
               });
               
               card.addEventListener('mouseleave', () => {
                   card.style.transform = '';
               });
               
               // Click with particles
               card.addEventListener('click', (e) => {
                   const rect = card.getBoundingClientRect();
                   const x = e.clientX - rect.left;
                   const y = e.clientY - rect.top;
                   
                   // Create particles
                   for (let i = 0; i < 12; i++) {
                       const particle = document.createElement('div');
                       particle.className = 'click-particle';
                       particle.style.left = `${x}px`;
                       particle.style.top = `${y}px`;
                       
                       const angle = (i / 12) * Math.PI * 2;
                       const velocity = 30 + Math.random() * 30;
                       const tx = Math.cos(angle) * velocity;
                       const ty = Math.sin(angle) * velocity;
                       
                       particle.style.setProperty('--tx', `${tx}px`);
                       particle.style.setProperty('--ty', `${ty}px`);
                       particle.style.background = `hsl(${Math.random() * 60 + 180}, 80%, 60%)`;
                       
                       card.appendChild(particle);
                       setTimeout(() => particle.remove(), 800);
                   }
                   
                   // Magnetic pull effect
                   card.style.transform = 'scale(0.95)';
                   setTimeout(() => {
                       card.style.transform = '';
                       window.open(card.dataset.url, '_blank');
                   }, 200);
               });
           });
       }

       // Filter Tabs
       const tabs = document.querySelectorAll('.tab');
       tabs.forEach(tab => {
           tab.addEventListener('click', () => {
               tabs.forEach(t => t.classList.remove('active'));
               tab.classList.add('active');
               renderTools(tab.dataset.category);
           });
       });

       // Spotlight Effect
       const spotlight = document.getElementById('spotlight');
       document.addEventListener('mousemove', (e) => {
           spotlight.style.left = `${e.clientX - 300}px`;
           spotlight.style.top = `${e.clientY - 300}px`;
           spotlight.style.opacity = '1';
       });

       // Initialize
       renderTools();

       // Smooth scroll reveal
       const observer = new IntersectionObserver((entries) => {
           entries.forEach(entry => {
               if (entry.isIntersecting) {
                   entry.target.style.opacity = '1';
                   entry.target.style.transform = 'translateY(0)';
               }
           });
       }, { threshold: 0.1 });
   </script>
</body>
</html>
